name: 자동 배포

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: [self-hosted, foket-server]

    steps:
      - name: 코드 최신화
        run: git -C ~/foket pull origin main

      - name: 패키지 설치 (변경 시)
        run: |
          cd ~/foket/api
          npm install --production

      - name: API 서버 재시작
        run: |
          pkill -f "node.*server.js" || true
          pkill -f "node.*webhook.js" || true
          sleep 2
          nohup node ~/foket/api/server.js > ~/foket/api/server.log 2>&1 &
          nohup node ~/foket/api/webhook.js > ~/foket/api/webhook.log 2>&1 &
          echo "배포 완료"
