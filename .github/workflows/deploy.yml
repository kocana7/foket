name: 자동 배포

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: [self-hosted, foket-server]

    steps:
      - name: 코드 최신화
        shell: bash
        run: git -C /c/foket pull origin main

      - name: 패키지 설치 (변경 시)
        shell: bash
        run: |
          cd /c/foket/api
          npm install --production

      - name: API 서버 재시작 (PM2)
        shell: bash
        run: |
          pm2 restart foket-api || pm2 start /c/foket/api/server.js --name foket-api --log /c/foket/api/server.log
          pm2 save
          echo "배포 완료"
