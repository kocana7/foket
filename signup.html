<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>회원가입 - Foket</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue: #334BFA; --blue-dark: #2438e0; --blue-light: #EEF0FF;
      --green: #00C896; --red: #F04438;
      --gray-50: #F9FAFB; --gray-100: #F2F4F7; --gray-200: #E4E7EC;
      --gray-300: #D0D5DD; --gray-400: #98A2B3; --gray-500: #667085;
      --gray-600: #475467; --gray-700: #344054; --gray-900: #101828;
      --white: #FFFFFF;
      --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    body { font-family: var(--font); background: var(--white); color: var(--gray-900); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; -webkit-font-smoothing: antialiased; }
    .shell { width: 100%; max-width: 480px; }
    .brand { display: flex; align-items: center; justify-content: center; margin-bottom: 18px; gap: 10px; font-weight: 900; letter-spacing: -0.5px; font-size: 20px; }
    .card { background: var(--white); border: 1px solid var(--gray-200); border-radius: 24px; padding: 34px 28px; box-shadow: 0 10px 40px rgba(16,24,40,0.06); }
    h1 { font-size: 24px; font-weight: 900; margin-bottom: 6px; }
    .sub { font-size: 14px; color: var(--gray-500); margin-bottom: 22px; line-height: 1.6; }
    .google-btn-wrap { width: 100%; margin-bottom: 0; }
    .google-btn-wrap > div { width: 100% !important; }
    .social-btn { width: 100%; padding: 12px 14px; border-radius: 12px; border: 1px solid var(--gray-300); background: var(--white); cursor: pointer; font-size: 14px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 10px; transition: background 0.15s, border-color 0.15s; font-family: var(--font); color: var(--gray-900); }
    .social-btn:hover { background: var(--gray-50); border-color: var(--gray-200); }
    .social-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .divider { display: flex; align-items: center; gap: 12px; color: var(--gray-400); font-size: 13px; margin: 18px 0; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--gray-200); }
    .form-group { margin-bottom: 14px; }
    .label { display: block; font-size: 13px; font-weight: 700; color: var(--gray-700); margin-bottom: 6px; }
    .input { width: 100%; padding: 11px 14px; border: 1px solid var(--gray-300); border-radius: 12px; font-size: 14px; font-family: var(--font); outline: none; transition: border-color 0.15s, box-shadow 0.15s; background: var(--white); color: var(--gray-900); }
    .input:focus { border-color: var(--blue); box-shadow: 0 0 0 4px var(--blue-light); }
    .btn { width: 100%; padding: 12px 14px; border-radius: 12px; border: none; cursor: pointer; font-size: 15px; font-weight: 800; transition: background 0.15s, transform 0.02s; font-family: var(--font); }
    .btn:active { transform: translateY(1px); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-primary { background: var(--blue); color: var(--white); }
    .btn-primary:hover:not(:disabled) { background: var(--blue-dark); }
    .btn-ghost { width: 100%; padding: 12px 14px; border-radius: 12px; border: 1px solid var(--gray-300); cursor: pointer; background: var(--white); font-size: 14px; font-weight: 800; color: var(--gray-700); transition: background 0.15s, border-color 0.15s; margin-top: 12px; font-family: var(--font); }
    .btn-ghost:hover { background: var(--gray-50); border-color: var(--gray-200); }
    .hint { margin-top: 14px; font-size: 12px; color: var(--gray-500); line-height: 1.6; text-align: center; }
    .link { color: var(--blue); cursor: pointer; font-weight: 800; text-decoration: none; }
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--gray-900); color: var(--white); padding: 14px 20px; border-radius: 12px; font-size: 14px; font-weight: 800; display: none; z-index: 5000; max-width: calc(100vw - 48px); text-align: center; }
    .toast.show { display: block; animation: toastIn 0.25s ease; }
    .toast.error { background: var(--red); }
    @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
  </style>
</head>
<body>
  <div class="shell">
    <div class="brand"><img src="logo.svg" alt="FOKET" style="height:32px;width:auto;"> FOKET.COM</div>
    <div class="card" role="main">
      <h1>계정 만들기</h1>
      <div class="sub">구글 또는 이메일로 가입할 수 있습니다.</div>

      <!-- Google Sign-In 버튼 (GSI 라이브러리가 렌더링) -->
      <div id="googleBtnContainer">
        <button class="social-btn" id="googleFallbackBtn" onclick="handleGoogleSignup()" type="button">
          <svg width="18" height="18" viewBox="0 0 18 18">
            <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/>
            <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#34A853"/>
            <path d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
            <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
          </svg>
          Google로 계속
        </button>
      </div>

      <div class="divider">또는</div>

      <form id="signupForm" onsubmit="handleEmailSignup(event)">
        <div class="form-group">
          <label class="label" for="name">전체 이름</label>
          <input class="input" id="name" name="name" type="text" placeholder="홍길동" autocomplete="name" required />
        </div>
        <div class="form-group">
          <label class="label" for="email">이메일</label>
          <input class="input" id="email" name="email" type="email" placeholder="hong@example.com" autocomplete="email" required />
        </div>
        <div class="form-group">
          <label class="label" for="password">비밀번호</label>
          <input class="input" id="password" name="password" type="password" placeholder="8자 이상" autocomplete="new-password" minlength="8" required />
        </div>
        <button class="btn btn-primary" id="submitBtn" type="submit">계정 만들기</button>
      </form>

      <button class="btn-ghost" type="button" onclick="window.location.href='main.html'">메인으로 돌아가기</button>
      <div class="hint">이미 계정이 있으신가요? <a class="link" onclick="window.location.href='main.html'">로그인</a></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const API = '';  // 상대경로 (nginx 프록시)
    let googleClientId = '';

    function showToast(msg, isError = false) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.className = 'toast show' + (isError ? ' error' : '');
      setTimeout(() => toast.className = 'toast', 3500);
    }

    function saveSession(token, user) {
      localStorage.setItem('foket-token', token);
      localStorage.setItem('foket-user', JSON.stringify(user));
    }

    // 서버에서 공개 설정 가져오기
    async function loadConfig() {
      try {
        const res = await fetch(`${API}/api/public-config`);
        const cfg = await res.json();
        googleClientId = cfg.googleClientId || '';
        if (googleClientId) initGoogleSignIn();
      } catch {}
    }

    function initGoogleSignIn() {
      if (!window.google) return;
      google.accounts.id.initialize({
        client_id: googleClientId,
        callback: handleGoogleCredential
      });
      const container = document.getElementById('googleBtnContainer');
      container.innerHTML = '';
      google.accounts.id.renderButton(container, {
        type: 'standard',
        theme: 'outline',
        size: 'large',
        text: 'continue_with',
        width: 424,
        locale: 'ko'
      });
    }

    async function handleGoogleCredential(response) {
      try {
        const res = await fetch(`${API}/api/google-auth`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ credential: response.credential })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Google 인증 실패');
        saveSession(data.token, data.user);
        showToast(data.isNew ? '가입 완료! Foket에 오신 것을 환영합니다 🎉' : '로그인 완료!');
        setTimeout(() => window.location.href = 'main.html', 1200);
      } catch (err) {
        showToast(err.message, true);
      }
    }

    async function handleGoogleSignup() {
      if (!googleClientId) {
        showToast('Google 로그인은 아직 설정 중입니다. 이메일로 가입해주세요.', true);
        return;
      }
      google.accounts.id.prompt();
    }

    async function handleEmailSignup(event) {
      event.preventDefault();
      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = '생성 중...';
      try {
        const full_name = document.getElementById('name').value.trim();
        const email     = document.getElementById('email').value.trim();
        const password  = document.getElementById('password').value;

        const res = await fetch(`${API}/api/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ full_name, email, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || '가입에 실패했습니다.');
        saveSession(data.token, data.user);
        showToast('계정이 생성되었습니다! Foket에 오신 것을 환영합니다 🎉');
        setTimeout(() => window.location.href = 'main.html', 1200);
      } catch (err) {
        showToast(err.message, true);
      } finally {
        btn.disabled = false;
        btn.textContent = '계정 만들기';
      }
    }

    // Google GSI 라이브러리 로드 후 초기화
    window.addEventListener('load', () => {
      loadConfig().then(() => {
        // GSI가 비동기로 로드될 수 있으므로 잠시 대기
        if (googleClientId && !window.google) {
          setTimeout(() => { if (window.google) initGoogleSignIn(); }, 1000);
        }
      });
    });
  </script>
</body>
</html>
