<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>자주하는 질문(FAQ) | FoketSignal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root{--bg-primary:#0a0e1a;--bg-secondary:#0f1629;--bg-card:#131c31;--bg-card-hover:#1a2540;--border-color:#1e2d4a;--text-primary:#e8edf5;--text-secondary:#8fa3c0;--text-muted:#566a85;--accent-blue:#00b4d8;--gradient-primary:linear-gradient(135deg,#00b4d8 0%,#0077a8 100%);--radius-md:12px;--radius-sm:8px;--shadow-card:0 8px 32px rgba(0,0,0,0.4)}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:var(--bg-primary);color:var(--text-primary);line-height:1.6}
    a{color:var(--accent-blue);text-decoration:none}
    .navbar{position:sticky;top:0;z-index:100;background:rgba(10,14,26,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border-color)}
    .navbar-inner{max-width:1280px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:70px}
    .navbar-brand{display:flex;align-items:center;gap:10px;font-size:22px;font-weight:800;color:var(--text-primary)}
    .navbar-brand .logo-icon{width:38px;height:38px;background:var(--gradient-primary);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;overflow:hidden}
    .navbar-brand span{color:var(--accent-blue)}
    .navbar-nav{display:flex;align-items:center;gap:4px}
    .navbar-nav a{color:var(--text-secondary);font-size:14px;font-weight:500;padding:8px 14px;border-radius:var(--radius-sm)}
    .navbar-nav a:hover,.navbar-nav a.active{color:var(--text-primary);background:var(--bg-card)}
    .navbar-actions{display:flex;align-items:center;gap:10px}
    .lang-dropdown{position:relative}
    .lang-btn{display:flex;align-items:center;gap:6px;background:var(--bg-card);border:1px solid var(--border-color);border-radius:var(--radius-sm);padding:7px 12px;font-size:12px;color:var(--text-secondary);cursor:pointer;font-family:inherit}
    .lang-btn:hover{border-color:var(--accent-blue);color:var(--accent-blue)}
    .lang-menu{position:absolute;top:calc(100% + 6px);right:0;background:var(--bg-card);border:1px solid var(--border-color);border-radius:var(--radius-md);padding:6px;min-width:155px;display:none;z-index:200;box-shadow:var(--shadow-card)}
    .lang-menu.open{display:block}
    .lang-opt{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:var(--radius-sm);font-size:13px;color:var(--text-secondary);cursor:pointer;text-decoration:none}
    .lang-opt:hover{background:var(--bg-card-hover);color:var(--text-primary)}
    .lang-opt.cur{color:var(--accent-blue)}
    .container{max-width:900px;margin:0 auto;padding:0 24px}
    .section{padding:60px 0}
    .sec-title{font-size:28px;font-weight:800;margin-bottom:12px;text-align:center}
    .sec-sub{color:var(--text-secondary);text-align:center;margin-bottom:40px}
    .faq-list{display:flex;flex-direction:column;gap:12px}
    .faq-item{background:var(--bg-card);border:1px solid var(--border-color);border-radius:var(--radius-md);overflow:hidden;transition:all .2s}
    .faq-item:hover{border-color:rgba(0,180,216,.3)}
    .faq-q{padding:18px 20px;font-size:16px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:12px}
    .faq-q i{color:var(--accent-blue);transition:transform .25s;flex-shrink:0}
    .faq-item.open .faq-q i{transform:rotate(180deg)}
    .faq-a{padding:0 20px;max-height:0;overflow:hidden;transition:max-height .3s ease}
    .faq-item.open .faq-a{max-height:600px}
    .faq-a-inner{padding:0 0 20px;color:var(--text-secondary);font-size:15px;line-height:1.7;white-space:pre-line}
    .faq-empty{text-align:center;color:var(--text-secondary);padding:60px 24px}
    .faq-loading{text-align:center;color:var(--text-secondary);padding:40px}
    footer{background:var(--bg-secondary);border-top:1px solid var(--border-color);padding:24px;text-align:center;color:var(--text-secondary);font-size:13px}
    footer a{color:var(--accent-blue)}
    .hamburger{display:none}
    @media(max-width:768px){
      .navbar-nav{display:none}
      .hamburger{display:block;background:none;border:1px solid var(--border-color);padding:8px;color:var(--text-primary);cursor:pointer;border-radius:var(--radius-sm)}
    }
  </style>
</head>
<body>
<nav class="navbar">
  <div class="navbar-inner">
    <a href="index.html" class="navbar-brand">
      <div class="logo-icon"><img src="images/logo2.png" alt="FoketSignal" style="width:100%;height:100%;object-fit:contain;border-radius:8px;"></div>
      Foket<span>Signal</span>
    </a>
    <div class="navbar-nav">
      <a href="index.html" data-i18n="h">홈</a>
      <a href="index.html#pricing" data-i18n="p">요금제</a>
      <a href="faq.html" class="active" data-i18n="f">자주하는 질문(FAQ)</a>
      <a href="index.html#contact" data-i18n="c">문의</a>
    </div>
    <div class="navbar-actions">
      <div class="lang-dropdown">
        <button class="lang-btn" id="langToggle"><span id="curFlag">🇰🇷</span><span id="curLang">한국어</span><span>▾</span></button>
        <div class="lang-menu" id="langMenu">
          <a class="lang-opt" data-lang="ko" href="#">🇰🇷 한국어</a>
          <a class="lang-opt" data-lang="en" href="#">🇺🇸 English</a>
          <a class="lang-opt" data-lang="de" href="#">🇩🇪 Deutsch</a>
          <a class="lang-opt" data-lang="ja" href="#">🇯🇵 日本語</a>
          <a class="lang-opt" data-lang="zh" href="#">🇨🇳 中文</a>
          <a class="lang-opt" data-lang="fr" href="#">🇫🇷 Français</a>
          <a class="lang-opt" data-lang="es" href="#">🇪🇸 Español</a>
          <a class="lang-opt" data-lang="ru" href="#">🇷🇺 Русский</a>
        </div>
      </div>
      <a href="https://t.me/foketsignal_Lobby" target="_blank" rel="noopener noreferrer" style="display:inline-flex;align-items:center;gap:6px;background:var(--gradient-primary);color:#fff;padding:9px 18px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;text-decoration:none"><i class="fab fa-telegram-plane"></i> <span data-i18n="j">무료 텔레그램 참여</span></a>
    </div>
    <button class="hamburger" aria-label="Menu">&#9776;</button>
  </div>
</nav>

<main class="section">
  <div class="container">
    <h1 class="sec-title" data-i18n="title">자주하는 질문</h1>
    <p class="sec-sub" data-i18n="subtitle">서비스 이용에 대해 자주 묻는 질문과 답변입니다.</p>
    <div id="faq-container">
      <div class="faq-loading" id="faq-loading"><i class="fas fa-spinner fa-spin"></i> <span data-i18n="loading">불러오는 중...</span></div>
      <div class="faq-list" id="faq-list" style="display:none"></div>
      <div class="faq-empty" id="faq-empty" style="display:none"><i class="fas fa-info-circle" style="font-size:32px;margin-bottom:12px;opacity:.5"></i><p data-i18n="empty">등록된 FAQ가 없습니다.</p></div>
    </div>
  </div>
</main>

<footer>
  <a href="index.html">FoketSignal</a> &copy; 2026 · <a href="index.html#contact" data-i18n="c">문의</a>
</footer>

<script>
(function(){
  var T = {
    ko: { title:'자주하는 질문', subtitle:'서비스 이용에 대해 자주 묻는 질문과 답변입니다.', h:'홈', p:'요금제', f:'자주하는 질문(FAQ)', c:'문의', j:'무료 텔레그램 참여', loading:'불러오는 중...', empty:'등록된 FAQ가 없습니다.' },
    en: { title:'FAQ', subtitle:'Frequently asked questions about our service.', h:'Home', p:'Pricing', f:'FAQ', c:'Contact', j:'Join Free Telegram', loading:'Loading...', empty:'No FAQ entries found.' },
    de: { title:'Häufige Fragen', subtitle:'Häufig gestellte Fragen zu unserem Service.', h:'Startseite', p:'Preise', f:'Häufige Fragen (FAQ)', c:'Kontakt', j:'Kostenlos beitreten', loading:'Wird geladen...', empty:'Keine FAQ-Einträge gefunden.' },
    ja: { title:'よくある質問', subtitle:'サービスについてよくある質問と回答です。', h:'ホーム', p:'料金', f:'よくある質問(FAQ)', c:'お問い合わせ', j:'無料Telegram参加', loading:'読み込み中...', empty:'FAQが登録されていません。' },
    zh: { title:'常见问题', subtitle:'关于我们服务的常见问题解答。', h:'首页', p:'定价', f:'常见问题(FAQ)', c:'联系我们', j:'免费加入Telegram', loading:'加载中...', empty:'暂无常见问题。' },
    fr: { title:'Questions fréquentes', subtitle:'Questions fréquemment posées sur notre service.', h:'Accueil', p:'Tarifs', f:'FAQ', c:'Contact', j:'Rejoindre Telegram gratuitement', loading:'Chargement...', empty:'Aucune question enregistrée.' },
    es: { title:'Preguntas frecuentes', subtitle:'Preguntas frecuentes sobre nuestro servicio.', h:'Inicio', p:'Precios', f:'Preguntas frecuentes (FAQ)', c:'Contacto', j:'Unirse gratis a Telegram', loading:'Cargando...', empty:'No hay preguntas registradas.' },
    ru: { title:'Часто задаваемые вопросы', subtitle:'Часто задаваемые вопросы о нашем сервисе.', h:'Главная', p:'Тарифы', f:'Часто задаваемые вопросы (FAQ)', c:'Контакт', j:'Присоединиться к Telegram бесплатно', loading:'Загрузка...', empty:'Вопросы не зарегистрированы.' }
  };
  var LANG_META = {ko:{flag:'🇰🇷',name:'한국어'},en:{flag:'🇺🇸',name:'English'},de:{flag:'🇩🇪',name:'Deutsch'},ja:{flag:'🇯🇵',name:'日本語'},zh:{flag:'🇨🇳',name:'中文'},fr:{flag:'🇫🇷',name:'Français'},es:{flag:'🇪🇸',name:'Español'},ru:{flag:'🇷🇺',name:'Русский'}};

  var currentLang = localStorage.getItem('lang') || 'ko';
  var allItems = [];

  function getApiBase(){
    if (location.protocol !== 'file:') return location.origin + '/api';
    return 'http://localhost:3000/api';
  }

  function escapeHtml(s){
    if (!s) return '';
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function getLocalized(field, lang) {
    if (!field) return '';
    if (typeof field === 'object') return field[lang] || field['ko'] || Object.values(field).find(v => v) || '';
    return field; // backward compat: plain string
  }

  function applyLang(lang) {
    if (!T[lang]) lang = 'ko';
    currentLang = lang;
    localStorage.setItem('lang', lang);
    document.documentElement.lang = lang;
    var t = T[lang];
    document.title = t.title + ' | FoketSignal';
    document.querySelectorAll('[data-i18n]').forEach(function(el) {
      var k = el.getAttribute('data-i18n');
      if (t[k] !== undefined) el.textContent = t[k];
    });
    var meta = LANG_META[lang];
    document.getElementById('curFlag').textContent = meta.flag;
    document.getElementById('curLang').textContent = meta.name;
    document.querySelectorAll('.lang-opt').forEach(function(opt) {
      opt.classList.toggle('cur', opt.dataset.lang === lang);
    });
    renderFaq(allItems);
  }

  function renderFaq(items) {
    var faqList = document.getElementById('faq-list');
    var faqLoading = document.getElementById('faq-loading');
    var faqEmpty = document.getElementById('faq-empty');
    faqLoading.style.display = 'none';
    if (!items || items.length === 0) {
      faqEmpty.style.display = 'block';
      faqList.style.display = 'none';
      return;
    }
    faqEmpty.style.display = 'none';
    faqList.style.display = 'flex';
    var sorted = items.slice().sort(function(a,b){ return (a.order != null ? a.order : 999) - (b.order != null ? b.order : 999); });
    faqList.innerHTML = sorted.map(function(item) {
      var q = escapeHtml(getLocalized(item.question, currentLang));
      var a = escapeHtml(getLocalized(item.answer, currentLang));
      return '<div class="faq-item">' +
        '<div class="faq-q" role="button" tabindex="0" aria-expanded="false">' +
          '<span>' + q + '</span><i class="fas fa-chevron-down"></i>' +
        '</div>' +
        '<div class="faq-a"><div class="faq-a-inner">' + a + '</div></div>' +
      '</div>';
    }).join('');

    faqList.querySelectorAll('.faq-q').forEach(function(qEl) {
      qEl.addEventListener('click', function() {
        var item = this.closest('.faq-item');
        var open = item.classList.contains('open');
        faqList.querySelectorAll('.faq-item').forEach(function(i){ i.classList.remove('open'); });
        if (!open) item.classList.add('open');
        this.setAttribute('aria-expanded', String(!open));
      });
    });
  }

  function loadFaq() {
    fetch(getApiBase() + '/storage/faq')
      .then(function(r) { return r.json(); })
      .then(function(j) {
        var data = [];
        if (j.success && j.value != null) {
          try { data = JSON.parse(j.value); } catch(e) {}
          try { localStorage.setItem('fk_faq', j.value); } catch(e) {}
        } else {
          try { var ls = localStorage.getItem('fk_faq'); if (ls) data = JSON.parse(ls); } catch(e) {}
        }
        allItems = Array.isArray(data) ? data : [];
        renderFaq(allItems);
      })
      .catch(function() {
        try { var ls = localStorage.getItem('fk_faq'); if (ls) allItems = JSON.parse(ls); } catch(e) {}
        renderFaq(allItems);
      });
  }

  loadFaq();
  applyLang(currentLang);

  document.getElementById('langToggle').addEventListener('click', function(e) { e.stopPropagation(); document.getElementById('langMenu').classList.toggle('open'); });
  document.addEventListener('click', function() { document.getElementById('langMenu').classList.remove('open'); });
  document.querySelectorAll('.lang-opt').forEach(function(opt) {
    opt.addEventListener('click', function(e) {
      e.preventDefault();
      currentLang = opt.dataset.lang;
      localStorage.setItem('lang', currentLang);
      document.getElementById('langMenu').classList.remove('open');
      applyLang(currentLang);
    });
  });
})();
</script>
</body>
</html>
