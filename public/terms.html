<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>이용약관 | FoketSignal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --bg-primary: #0a0e1a;
      --bg-secondary: #0f1629;
      --bg-card: #131c31;
      --border-color: #1e2d4a;
      --text-primary: #e8edf5;
      --text-secondary: #8fa3c0;
      --accent-blue: #00b4d8;
      --gradient-primary: linear-gradient(135deg,#00b4d8 0%,#0077a8 100%);
      --radius-md: 12px;
      --radius-sm: 8px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:var(--bg-primary);color:var(--text-primary);line-height:1.6}
    a{color:var(--accent-blue);text-decoration:none}
    .navbar{position:sticky;top:0;z-index:100;background:rgba(10,14,26,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border-color)}
    .navbar-inner{max-width:1280px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:70px}
    .navbar-brand{display:flex;align-items:center;gap:10px;font-size:22px;font-weight:800;color:var(--text-primary)}
    .navbar-brand .logo-icon{width:38px;height:38px;background:var(--gradient-primary);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;overflow:hidden}
    .navbar-brand span{color:var(--accent-blue)}
    .navbar-nav{display:flex;align-items:center;gap:4px}
    .navbar-nav a{color:var(--text-secondary);font-size:14px;font-weight:500;padding:8px 14px;border-radius:var(--radius-sm)}
    .navbar-nav a:hover,.navbar-nav a.active{color:var(--text-primary);background:var(--bg-card)}
    .container{max-width:900px;margin:0 auto;padding:0 24px}
    .section{padding:60px 0}
    .sec-title{font-size:28px;font-weight:800;margin-bottom:24px}
    .terms-body{background:var(--bg-card);border:1px solid var(--border-color);border-radius:var(--radius-md);padding:32px 40px;color:var(--text-secondary);font-size:15px;line-height:1.8;white-space:pre-wrap}
    .terms-empty{text-align:center;color:var(--text-secondary);padding:60px 24px}
    footer{background:var(--bg-secondary);border-top:1px solid var(--border-color);padding:24px;text-align:center;color:var(--text-secondary);font-size:13px}
    footer a{color:var(--accent-blue)}
  </style>
</head>
<body>
<nav class="navbar">
  <div class="navbar-inner">
    <a href="index.html" class="navbar-brand">
      <div class="logo-icon">
        <img src="images/logo2.png" alt="FoketSignal 로고" style="width:100%;height:100%;object-fit:contain;border-radius:8px;">
      </div>
      Foket<span>Signal</span>
    </a>
    <div class="navbar-nav">
      <a href="index.html">홈</a>
      <a href="index.html#pricing">요금제</a>
      <a href="faq.html">자주하는 질문(FAQ)</a>
      <a href="index.html#contact">문의</a>
    </div>
    <a href="https://t.me/foketsignal_Lobby" target="_blank" rel="noopener noreferrer" class="btn-tg" style="display:inline-flex;align-items:center;gap:6px;background:var(--gradient-primary);color:#fff;padding:9px 18px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;text-decoration:none"><i class="fab fa-telegram-plane"></i> 무료 텔레그램 참여</a>
  </div>
</nav>

<main class="section">
  <div class="container">
    <h1 class="sec-title">이용약관</h1>
    <div id="terms-content" class="terms-body"></div>
    <div id="terms-empty" class="terms-empty" style="display:none">등록된 이용약관이 없습니다. 관리자 페이지에서 이용약관 내용을 입력해 주세요.</div>
  </div>
</main>

<footer>
  <a href="index.html">FoketSignal</a> &copy; 2026 · <a href="index.html#contact">문의</a>
</footer>

<script>
(function(){
  var raw = '';
  try { raw = localStorage.getItem('fk_terms') || ''; } catch (e) {}
  var content = document.getElementById('terms-content');
  var empty = document.getElementById('terms-empty');
  if (raw && raw.trim()) {
    content.textContent = raw;
    content.style.display = 'block';
    empty.style.display = 'none';
  } else {
    content.style.display = 'none';
    empty.style.display = 'block';
  }
})();
</script>
</body>
</html>
