<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 | FoketSignal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root{--bg-primary:#0a0e1a;--bg-secondary:#0f1629;--bg-card:#131c31;--bg-card-hover:#1a2540;--border-color:#1e2d4a;--text-primary:#e8edf5;--text-secondary:#8fa3c0;--accent-blue:#00b4d8;--gradient-primary:linear-gradient(135deg,#00b4d8 0%,#0077a8 100%);--radius-md:12px;--radius-sm:8px;--shadow-card:0 8px 32px rgba(0,0,0,0.4)}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:var(--bg-primary);color:var(--text-primary);line-height:1.6;min-height:100vh;display:flex;flex-direction:column}
    a{color:var(--accent-blue);text-decoration:none}
    .navbar{position:sticky;top:0;z-index:100;background:rgba(10,14,26,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border-color)}
    .navbar-inner{max-width:1280px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:70px}
    .navbar-brand{display:flex;align-items:center;gap:10px;font-size:22px;font-weight:800;color:var(--text-primary)}
    .navbar-brand .logo-icon{width:38px;height:38px;background:var(--gradient-primary);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;overflow:hidden}
    .navbar-brand span{color:var(--accent-blue)}
    .navbar-nav{display:flex;align-items:center;gap:4px}
    .navbar-nav a{color:var(--text-secondary);font-size:14px;font-weight:500;padding:8px 14px;border-radius:var(--radius-sm)}
    .navbar-nav a:hover{color:var(--text-primary);background:var(--bg-card)}
    .navbar-actions{display:flex;align-items:center;gap:10px}
    .lang-dropdown{position:relative}
    .lang-btn{display:flex;align-items:center;gap:6px;background:var(--bg-card);border:1px solid var(--border-color);border-radius:var(--radius-sm);padding:7px 12px;font-size:12px;color:var(--text-secondary);cursor:pointer;font-family:inherit}
    .lang-btn:hover{border-color:var(--accent-blue);color:var(--accent-blue)}
    .lang-menu{position:absolute;top:calc(100% + 6px);right:0;background:var(--bg-card);border:1px solid var(--border-color);border-radius:var(--radius-md);padding:6px;min-width:155px;display:none;z-index:200;box-shadow:var(--shadow-card)}
    .lang-menu.open{display:block}
    .lang-opt{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:var(--radius-sm);font-size:13px;color:var(--text-secondary);cursor:pointer;text-decoration:none}
    .lang-opt:hover{background:var(--bg-card-hover);color:var(--text-primary)}
    .lang-opt.cur{color:var(--accent-blue)}
    main{flex:1;display:flex;align-items:center;justify-content:center;padding:60px 24px}
    .auth-card{background:var(--bg-card);border:1px solid var(--border-color);border-radius:var(--radius-md);padding:40px;max-width:460px;width:100%;margin:0 auto}
    .auth-title{font-size:24px;font-weight:800;margin-bottom:8px;text-align:center}
    .auth-sub{color:var(--text-secondary);text-align:center;margin-bottom:32px;font-size:14px}
    .fg{margin-bottom:18px}
    .fl{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:var(--text-secondary)}
    .fc{width:100%;background:var(--bg-secondary);border:1px solid var(--border-color);border-radius:var(--radius-sm);padding:11px 14px;font-size:14px;color:var(--text-primary);font-family:inherit}
    .fc:focus{outline:none;border-color:var(--accent-blue)}
    .btn-submit{width:100%;background:var(--gradient-primary);color:#fff;border:none;border-radius:var(--radius-sm);padding:13px;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px}
    .btn-submit:hover{opacity:0.9}
    .btn-submit:disabled{opacity:0.6;cursor:not-allowed}
    .auth-err{background:rgba(220,53,69,.15);border:1px solid rgba(220,53,69,.4);border-radius:var(--radius-sm);padding:10px 14px;color:#ff6b6b;font-size:13px;margin-bottom:16px;display:none}
    .auth-ok{background:rgba(0,180,100,.15);border:1px solid rgba(0,180,100,.4);border-radius:var(--radius-sm);padding:10px 14px;color:#2ecc71;font-size:13px;margin-bottom:16px;display:none}
    .auth-footer{text-align:center;margin-top:20px;font-size:13px;color:var(--text-secondary)}
    .auth-footer a{color:var(--accent-blue)}
    footer{background:var(--bg-secondary);border-top:1px solid var(--border-color);padding:24px;text-align:center;color:var(--text-secondary);font-size:13px}
    footer a{color:var(--accent-blue)}
    @media(max-width:768px){.navbar-nav{display:none}.auth-card{padding:28px 20px}}
  </style>
</head>
<body>
<nav class="navbar">
  <div class="navbar-inner">
    <a href="index.html" class="navbar-brand">
      <div class="logo-icon"><img src="images/logo2.png" alt="FoketSignal" style="width:100%;height:100%;object-fit:contain;border-radius:8px;"></div>
      Foket<span>Signal</span>
    </a>
    <div class="navbar-nav">
      <a href="index.html" data-i18n="h">홈</a>
      <a href="index.html#pricing" data-i18n="p">요금제</a>
      <a href="faq.html" data-i18n="f">자주하는 질문(FAQ)</a>
      <a href="index.html#contact" data-i18n="c">문의</a>
    </div>
    <div class="navbar-actions">
      <div class="lang-dropdown">
        <button class="lang-btn" id="langToggle"><span id="curFlag">🇰🇷</span><span id="curLang">한국어</span><span>▾</span></button>
        <div class="lang-menu" id="langMenu">
          <a class="lang-opt" data-lang="ko" href="#">🇰🇷 한국어</a>
          <a class="lang-opt" data-lang="en" href="#">🇺🇸 English</a>
          <a class="lang-opt" data-lang="de" href="#">🇩🇪 Deutsch</a>
          <a class="lang-opt" data-lang="ja" href="#">🇯🇵 日本語</a>
          <a class="lang-opt" data-lang="zh" href="#">🇨🇳 中文</a>
          <a class="lang-opt" data-lang="fr" href="#">🇫🇷 Français</a>
          <a class="lang-opt" data-lang="es" href="#">🇪🇸 Español</a>
          <a class="lang-opt" data-lang="ru" href="#">🇷🇺 Русский</a>
        </div>
      </div>
      <a href="https://t.me/foketsignal_Lobby" target="_blank" rel="noopener noreferrer" style="display:inline-flex;align-items:center;gap:6px;background:var(--gradient-primary);color:#fff;padding:9px 18px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;text-decoration:none"><i class="fab fa-telegram-plane"></i> <span data-i18n="j">무료 텔레그램 참여</span></a>
    </div>
  </div>
</nav>
<main>
  <div class="auth-card">
    <h1 class="auth-title" data-i18n="form_title">로그인</h1>
    <p class="auth-sub" data-i18n="form_sub">계정에 로그인하세요</p>
    <div class="auth-err" id="authErr"></div>
    <div class="auth-ok" id="authOk"></div>
    <form id="loginForm" onsubmit="doLogin(event)">
      <div class="fg">
        <label class="fl" for="email" data-i18n="email">이메일</label>
        <input class="fc" type="email" id="email" name="email" required autocomplete="email">
      </div>
      <div class="fg">
        <label class="fl" for="pw" data-i18n="pw">비밀번호</label>
        <input class="fc" type="password" id="pw" name="password" required autocomplete="current-password">
      </div>
      <button class="btn-submit" type="submit" id="submitBtn" data-i18n="submit">로그인</button>
    </form>
    <div class="auth-footer">
      <span data-i18n="no_account">계정이 없으신가요?</span> <a href="signup.html" data-i18n="signup_link">회원가입</a>
    </div>
  </div>
</main>
<footer>
  <a href="index.html">FoketSignal</a> &copy; 2026 · <a href="index.html#contact" data-i18n="c">문의</a>
</footer>
<script>
(function(){
  var T={
    ko:{title:'로그인',h:'홈',p:'요금제',f:'자주하는 질문(FAQ)',c:'문의',j:'무료 텔레그램 참여',
      form_title:'로그인',form_sub:'계정에 로그인하세요',email:'이메일',pw:'비밀번호',
      submit:'로그인',submitting:'처리 중...',no_account:'계정이 없으신가요?',signup_link:'회원가입',
      err_invalid:'이메일 또는 비밀번호가 올바르지 않습니다.',success:'로그인 성공! 이동 중...'},
    en:{title:'Login',h:'Home',p:'Pricing',f:'FAQ',c:'Contact',j:'Join Free Telegram',
      form_title:'Log In',form_sub:'Sign in to your account',email:'Email',pw:'Password',
      submit:'Log In',submitting:'Processing...',no_account:'Don\'t have an account?',signup_link:'Sign Up',
      err_invalid:'Invalid email or password.',success:'Login successful! Redirecting...'},
    de:{title:'Anmelden',h:'Startseite',p:'Preise',f:'Häufige Fragen (FAQ)',c:'Kontakt',j:'Kostenlos beitreten',
      form_title:'Anmelden',form_sub:'Bei Ihrem Konto anmelden',email:'E-Mail',pw:'Passwort',
      submit:'Anmelden',submitting:'Verarbeitung...',no_account:'Noch kein Konto?',signup_link:'Registrieren',
      err_invalid:'Ungültige E-Mail oder Passwort.',success:'Anmeldung erfolgreich! Weiterleitung...'},
    ja:{title:'ログイン',h:'ホーム',p:'料金',f:'よくある質問(FAQ)',c:'お問い合わせ',j:'無料Telegram参加',
      form_title:'ログイン',form_sub:'アカウントにサインイン',email:'メールアドレス',pw:'パスワード',
      submit:'ログイン',submitting:'処理中...',no_account:'アカウントをお持ちでない方は',signup_link:'会員登録',
      err_invalid:'メールアドレスまたはパスワードが正しくありません。',success:'ログイン成功！移動中...'},
    zh:{title:'登录',h:'首页',p:'定价',f:'常见问题(FAQ)',c:'联系我们',j:'免费加入Telegram',
      form_title:'登录',form_sub:'登录您的账户',email:'电子邮箱',pw:'密码',
      submit:'登录',submitting:'处理中...',no_account:'还没有账户？',signup_link:'注册',
      err_invalid:'邮箱或密码不正确。',success:'登录成功！正在跳转...'},
    fr:{title:'Connexion',h:'Accueil',p:'Tarifs',f:'FAQ',c:'Contact',j:'Rejoindre Telegram gratuitement',
      form_title:'Se connecter',form_sub:'Connectez-vous à votre compte',email:'E-mail',pw:'Mot de passe',
      submit:'Se connecter',submitting:'Traitement...',no_account:'Pas encore de compte ?',signup_link:"S'inscrire",
      err_invalid:'E-mail ou mot de passe invalide.',success:'Connexion réussie ! Redirection...'},
    es:{title:'Iniciar sesión',h:'Inicio',p:'Precios',f:'Preguntas frecuentes (FAQ)',c:'Contacto',j:'Unirse gratis a Telegram',
      form_title:'Iniciar sesión',form_sub:'Inicia sesión en tu cuenta',email:'Correo electrónico',pw:'Contraseña',
      submit:'Iniciar sesión',submitting:'Procesando...',no_account:'¿No tienes una cuenta?',signup_link:'Registrarse',
      err_invalid:'Correo electrónico o contraseña inválidos.',success:'¡Inicio de sesión exitoso! Redirigiendo...'},
    ru:{title:'Войти',h:'Главная',p:'Тарифы',f:'Часто задаваемые вопросы (FAQ)',c:'Контакт',j:'Присоединиться к Telegram бесплатно',
      form_title:'Войти',form_sub:'Войдите в свой аккаунт',email:'Эл. почта',pw:'Пароль',
      submit:'Войти',submitting:'Обработка...',no_account:'Нет аккаунта?',signup_link:'Регистрация',
      err_invalid:'Неверный адрес почты или пароль.',success:'Вход выполнен! Перенаправление...'}
  };
  var LANG_META={ko:{flag:'🇰🇷',name:'한국어'},en:{flag:'🇺🇸',name:'English'},de:{flag:'🇩🇪',name:'Deutsch'},ja:{flag:'🇯🇵',name:'日本語'},zh:{flag:'🇨🇳',name:'中文'},fr:{flag:'🇫🇷',name:'Français'},es:{flag:'🇪🇸',name:'Español'},ru:{flag:'🇷🇺',name:'Русский'}};
  var currentLang=localStorage.getItem('lang')||'ko';

  function applyLang(lang){
    if(!T[lang])lang='ko';
    var t=T[lang];
    document.documentElement.lang=lang;
    document.title=t.title+' | FoketSignal';
    document.querySelectorAll('[data-i18n]').forEach(function(el){var k=el.getAttribute('data-i18n');if(t[k]!==undefined)el.textContent=t[k];});
    var meta=LANG_META[lang];
    document.getElementById('curFlag').textContent=meta.flag;
    document.getElementById('curLang').textContent=meta.name;
    document.querySelectorAll('.lang-opt').forEach(function(opt){opt.classList.toggle('cur',opt.dataset.lang===lang);});
  }

  applyLang(currentLang);

  document.getElementById('langToggle').addEventListener('click',function(e){e.stopPropagation();document.getElementById('langMenu').classList.toggle('open');});
  document.addEventListener('click',function(){document.getElementById('langMenu').classList.remove('open');});
  document.querySelectorAll('.lang-opt').forEach(function(opt){
    opt.addEventListener('click',function(e){
      e.preventDefault();
      currentLang=opt.dataset.lang;
      localStorage.setItem('lang',currentLang);
      document.getElementById('langMenu').classList.remove('open');
      applyLang(currentLang);
    });
  });

  var BASE=(location.protocol!=='file:')?location.origin+'/api':'http://localhost:3000/api';

  window.doLogin=function(e){
    e.preventDefault();
    var t=T[currentLang]||T['ko'];
    var email=document.getElementById('email').value.trim();
    var pw=document.getElementById('pw').value;
    var errEl=document.getElementById('authErr');
    var okEl=document.getElementById('authOk');
    var btn=document.getElementById('submitBtn');
    errEl.style.display='none';okEl.style.display='none';
    btn.disabled=true;btn.textContent=t.submitting;
    fetch(BASE+'/auth/login',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email:email,password:pw})
    }).then(function(r){return r.json();}).then(function(j){
      if(j.success){
        try{localStorage.setItem('fk_user',JSON.stringify(j.user));}catch(ex){}
        okEl.textContent=t.success;okEl.style.display='block';
        setTimeout(function(){
          if(j.user&&(j.user.role==='admin'||j.user.role==='superadmin')){
            window.location.href='/admin';
          }else{
            window.location.href='mypage.html';
          }
        },800);
      }else{
        errEl.textContent=j.error||t.err_invalid;errEl.style.display='block';
        btn.disabled=false;btn.textContent=t.submit;
      }
    }).catch(function(err){
      errEl.textContent=err.message||'Network error';errEl.style.display='block';
      btn.disabled=false;btn.textContent=t.submit;
    });
  };
})();
</script>
</body>
</html>
