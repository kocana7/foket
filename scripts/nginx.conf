# HTTP -> HTTPS 리다이렉트
server {
    listen 80;
    server_name foket.com www.foket.com;
    return 301 https://$host$request_uri;
}

# HTTPS 메인 설정 (certbot이 자동으로 SSL 블록 추가)
server {
    listen 443 ssl;
    server_name foket.com www.foket.com;

    # certbot --nginx 실행 후 자동으로 아래 라인이 채워짐
    # ssl_certificate /etc/letsencrypt/live/foket.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/foket.com/privkey.pem;

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    client_max_body_size 10M;
}
